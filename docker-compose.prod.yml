services:
  backend:
    build:
      context: ./projects/we-care/backend
      target: runner
    image: we-care-backend:prod
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./projects/we-care/frontend
      target: runner
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    image: we-care-frontend:prod
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
